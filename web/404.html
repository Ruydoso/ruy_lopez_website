<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
    <script>

        const currentPath = window.location.pathname;

        if (!currentPath.endsWith('.html') &&
            !currentPath.endsWith('.js') &&
            !currentPath.endsWith('.css') &&
            !currentPath.endsWith('.png') &&
            !currentPath.endsWith('.jpg') &&
            !currentPath.endsWith('.gif') &&
            !currentPath.endsWith('.svg') &&
            !currentPath.endsWith('.json') &&
            !currentPath.endsWith('.xml') &&
            !currentPath.endsWith('.txt') &&
            currentPath !== '/')
        {

            window.location.replace('/index.html' + window.location.search + window.location.hash);
        }
    </script>
</head>

<body>
    <p>Redirigiendo...</p>
</body>

</html>
